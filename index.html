<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gans Attack" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="Pics/avanslogo.png" />
  <title>Avans Gans Attack</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <div id="hud">
      <span id="hp-display">HP: <span id="hp">100</span></span>
      <span id="wave-display">Wave: <span id="wave">1</span></span>
      <span id="timer-display">Tijd: <span id="timer">0</span>s</span>
      <img id="hud-logo" src="Pics/avanslogo.png" alt="Avans" />
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="overlay" class="hidden">
      <div id="overlay-box">
        <img id="avans-logo" src="Pics/avanslogo.png" alt="Avans" />
        <img id="start-img" src="Pics/AvansGAnsAttack2.gif" alt="Avans Gans Attack" />
        <h1 id="overlay-title">Avans Gans Attack</h1>
        <p id="overlay-message">Survive as long as you can!</p>
        <div id="highscore-box"></div>
        <button id="overlay-btn">Start</button>
        <button id="sound-toggle">Geluid: AAN</button>
        <p id="rotate-hint">&#8635; Kantel je telefoon voor volledig scherm</p>
        <div id="install-banner">
          <span id="install-icon">&#11014;</span>
          <span>Tik op <strong>&#11014;</strong> en kies <strong>'Zet op beginscherm'</strong> voor volledig scherm zonder browserbalk</span>
        </div>
      </div>
    </div>
    <div id="level-up-panel" class="hidden">
      <h2 id="wave-complete-title">Wave voltooid!</h2>
      <div id="upgrade-options"></div>
    </div>
    <div id="dpad">
      <span class="dp-up">&#9650;</span>
      <span class="dp-left">&#9664;</span>
      <span class="dp-down">&#9660;</span>
      <span class="dp-right">&#9654;</span>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
